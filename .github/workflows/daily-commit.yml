name: Daily Scheduled Commit

on:
  schedule:
    # Runs at 14:30 UTC every day (specific hour and minute, no wildcards)
    - cron: '30 14 * * *'
  # Allows you to trigger the workflow manually for immediate testing
  workflow_dispatch: 

jobs:
  daily-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow GitHub Actions to push commits
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log for 23f3001984@ds.study.iitm.ac.in
        run: |
          echo "Automated run completed on $(date)" >> daily_log.txt
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_log.txt
          git commit -m "Automated daily commit by GitHub Actions" || echo "No changes to commit"
          git push